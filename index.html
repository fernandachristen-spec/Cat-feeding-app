    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: #1a1a1a;
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        .container {
            background: #222222;
            border-radius: 20px;
            padding: 24px 16px;
            max-width: 100%;
            width: 100%;
        }
        .header { text-align: center; margin-bottom: 32px; }
        .app-title {
            font-size: 40px;
            font-weight: 800;
            color: #FFFFFF;
            margin-bottom: 16px;
            letter-spacing: 1px;
        }
        .icon-display {
            width: 100px;
            height: 100px;
            margin: 0 auto 16px;
            border-radius: 22px;
            overflow: hidden;
        }
        .icon-display img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .cat-headers {
            display: grid;
            grid-template-columns: 70px 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
            align-items: center;
        }
        .time-col { font-weight: 600; color: #AAAAAA; font-size: 13px; text-align: center; padding: 8px; }
        .cat-header { font-weight: 800; font-size: 18px; color: #FFFFFF; text-align: center; padding: 8px; word-break: break-word; }
        .tracker-table {
            display: grid;
            grid-template-columns: 70px 1fr 1fr;
            gap: 16px;
            row-gap: 20px;
        }
        .time-slot {
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; color: #FFFFFF; font-size: 18px; padding: 12px 8px;
        }
        .status-cell {
            display: flex; align-items: center; justify-content: center;
            padding: 16px 12px; border-radius: 16px;
            font-weight: 800; font-size: 16px; cursor: pointer;
            user-select: none; transition: all 0.2s ease;
            min-height: 56px; border: 2px solid transparent;
        }
        .status-cell:active { transform: scale(0.95); }
        .status-nein { background: #1a3a1a; color: #32D74B; border-color: #32D74B; }
        .status-ja   { background: #3a1a1a; color: #FF453A; border-color: #FF453A; }
        .status-immer{ background: #3a2a0a; color: #FFD60A; border-color: #FFD60A; }
        .reset-info {
            text-align: center; color: #666; font-size: 13px; margin-top: 24px;
        }
        .reset-time { color: #888; }
    </style>
</head>

        <div class="app-title">Lügt er?</div>
    </div>
    <div class="cat-headers">
        <div class="time-col"></div>
        <div class="cat-header">Lügt Phil?</div>
        <div class="cat-header">Lügt Boris?</div>
    </div>
    <div class="tracker-table">
        <div class="time-slot">07:00</div>
        <div class="status-cell status-nein" data-cat="phil" data-time="0">nein</div>
        <div class="status-cell status-nein" data-cat="boris" data-time="0">nein</div>
        <div class="time-slot">12:00</div>
        <div class="status-cell status-nein" data-cat="phil" data-time="1">nein</div>
        <div class="status-cell status-nein" data-cat="boris" data-time="1">nein</div>
        <div class="time-slot">18:00</div>
        <div class="status-cell status-nein" data-cat="phil" data-time="2">nein</div>
        <div class="status-cell status-nein" data-cat="boris" data-time="2">nein</div>
    </div>
    <div class="reset-info">
        ⟳ Alle Einträge werden täglich um <span class="reset-time">00:00 Uhr</span> auf „nein" zurückgesetzt
    </div>
</div>
<script>
    const TIMES = ['0','1','2'];
    const CATS  = ['phil','boris'];
    function initializeTracker() { checkMidnightReset(); loadTrackerState(); }
    function checkMidnightReset() {
        const last = localStorage.getItem('lastResetDate');
        const today = new Date().toDateString();
        if (last !== today) {
            TIMES.forEach(t => CATS.forEach(c => localStorage.removeItem(`status_${c}_${t}`)));
            localStorage.setItem('lastResetDate', today);
        }
    }
    function loadTrackerState() {
        document.querySelectorAll('.status-cell').forEach(cell => {
            const s = localStorage.getItem(`status_${cell.dataset.cat}_${cell.dataset.time}`) || 'nein';
            updateCellUI(cell, s);
        });
    }
    function updateCellUI(cell, status) {
        cell.textContent = status;
        cell.className = `status-cell status-${status}`;
    }
    function toggleStatus(cat, time, current) {
        const next = current === 'nein' ? (Math.random() < 0.2 ? 'immer' : 'ja')
                   : current === 'ja'   ? 'immer' : 'nein';
        localStorage.setItem(`status_${cat}_${time}`, next);
        updateCellUI(document.querySelector(`[data-cat="${cat}"][data-time="${time}"]`), next);
    }
    document.querySelectorAll('.status-cell').forEach(cell => {
        cell.addEventListener('click', function() {
            toggleStatus(this.dataset.cat, this.dataset.time, this.textContent.toLowerCase());
        });
    });
    document.addEventListener('DOMContentLoaded', initializeTracker);
</script>
